name: Release Extension

on:
  push:
    tags:
      - 'v*' # Wyzwalacz przy tworzeniu tagów typu v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ai-slop-blocker
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install and Build
        run: |
          npm install
          npm run zip
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true # Tworzy Draft, nie publikuje od razu
          files: |
            ai-slop-blocker/ai-slop-blocker-v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
